name: Check and Publish Docker Images

on:
  schedule:
    - cron: "0 0 * * *" # Run every day
  workflow_dispatch: # Allow manual triggering

env:
  IMAGE_NAME: ${{ github.repository_owner }}/vuetorrent

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all tags

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        
      - name: Extract Docker image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Get versions
        id: versions
        run: |
          # Get latest VueTorrent version
          LATEST_VUETORRENT=$(curl -s "https://api.github.com/repos/VueTorrent/VueTorrent/releases/latest" | jq -r '.tag_name' | sed 's/^v//')
          echo "latest_vuetorrent=$LATEST_VUETORRENT" >> $GITHUB_OUTPUT

          # Get latest qBittorrent lt2 version
          LATEST_QBIT_LT2=$(curl -s "https://hub.docker.com/v2/repositories/qbittorrentofficial/qbittorrent-nox/tags?page_size=100&ordering=last_updated" \
            | jq -r '.results[].name' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+-lt2-[0-9]+$' \
            | grep -Ev 'latest|alpha|beta|rc' \
            | head -n1)
          echo "latest_qbit_lt2=$LATEST_QBIT_LT2" >> $GITHUB_OUTPUT

          # Get latest qBittorrent standard version
          LATEST_QBIT_STANDARD=$(curl -s "https://hub.docker.com/v2/repositories/qbittorrentofficial/qbittorrent-nox/tags?page_size=100&ordering=last_updated" \
            | jq -r '.results[].name' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+-[0-9]+$' \
            | grep -Ev 'lt2|latest|alpha|beta|rc' \
            | head -n1)
          echo "latest_qbit_standard=$LATEST_QBIT_STANDARD" >> $GITHUB_OUTPUT

          # Get current versions from git tags
          VUETORRENT_TAG=$(git tag -l "vuetorrent-*" | sort -V | tail -n1)
          QBIT_LT2_TAG=$(git tag -l "qbit-lt2-*" | sort -V | tail -n1)
          QBIT_STANDARD_TAG=$(git tag -l "qbit-standard-*" | sort -V | tail -n1)

          CURRENT_VUETORRENT="${VUETORRENT_TAG#vuetorrent-}"
          CURRENT_QBIT_LT2=${QBIT_LT2_TAG#qbit-lt2-}
          CURRENT_QBIT_STANDARD=${QBIT_STANDARD_TAG#qbit-standard-}

          # Set defaults if no tags exist
          CURRENT_VUETORRENT="${CURRENT_VUETORRENT:-0.0.0}"
          CURRENT_QBIT_LT2="${CURRENT_QBIT_LT2:-0.0.0}"
          CURRENT_QBIT_STANDARD="${CURRENT_QBIT_STANDARD:-0.0.0}"

          echo "current_vuetorrent=${CURRENT_VUETORRENT}" >> $GITHUB_OUTPUT
          echo "current_qbit_lt2=${CURRENT_QBIT_LT2}" >> $GITHUB_OUTPUT
          echo "current_qbit_standard=${CURRENT_QBIT_STANDARD}" >> $GITHUB_OUTPUT

          echo "VueTorrent: ${CURRENT_VUETORRENT} -> ${LATEST_VUETORRENT}"
          echo "QBit lt2: ${CURRENT_QBIT_LT2} -> ${LATEST_QBIT_LT2}"
          echo "QBit standard: ${CURRENT_QBIT_STANDARD} -> ${LATEST_QBIT_STANDARD}"

      - name: Check if update needed
        id: check
        run: |
          VUETORRENT_UPDATED=false
          LT2_NEEDS_UPDATE=false
          STANDARD_NEEDS_UPDATE=false

          if [ "${{ steps.versions.outputs.current_vuetorrent }}" != "${{ steps.versions.outputs.latest_vuetorrent }}" ]; then
            VUETORRENT_UPDATED=true
            echo "VueTorrent needs to be updated"
          else
            echo "VueTorrent is up to date"
          fi

          if [ "${{ steps.versions.outputs.current_qbit_lt2 }}" != "${{ steps.versions.outputs.latest_qbit_lt2 }}" ] || [ "${VUETORRENT_UPDATED}" = "true" ]; then
            LT2_NEEDS_UPDATE=true
            echo "QBit lt2 needs to be updated"
          else
            echo "QBit lt2 is up to date"
          fi

          if [ "${{ steps.versions.outputs.current_qbit_standard }}" != "${{ steps.versions.outputs.latest_qbit_standard }}" ] || [ "${VUETORRENT_UPDATED}" = "true" ]; then
            STANDARD_NEEDS_UPDATE=true
            echo "QBit standard needs to be updated"
          else
            echo "QBit standard is up to date"
          fi

          echo "vuetorrent_updated=${VUETORRENT_UPDATED}" >> $GITHUB_OUTPUT
          echo "lt2_needs_update=${LT2_NEEDS_UPDATE}" >> $GITHUB_OUTPUT
          echo "standard_needs_update=${STANDARD_NEEDS_UPDATE}" >> $GITHUB_OUTPUT

      - name: Build and push lt2 variant
        if: steps.check.outputs.lt2_needs_update == 'true'
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/386,linux/arm64,linux/arm/v7,linux/arm/v6,linux/riscv64
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            QBIT_TAG=${{ steps.versions.outputs.latest_qbit_lt2 }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.versions.outputs.latest_qbit_lt2 }}_${{ steps.versions.outputs.latest_vuetorrent }}
            ${{ env.IMAGE_NAME }}:latest-lt2
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: true
          sbom: true

      - name: Build and push standard variant
        if: steps.check.outputs.standard_needs_update == 'true'
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/386,linux/arm64,linux/arm/v7,linux/arm/v6,linux/riscv64
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            QBIT_TAG=${{ steps.versions.outputs.latest_qbit_standard }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.versions.outputs.latest_qbit_standard }}_${{ steps.versions.outputs.latest_vuetorrent }}
            ${{ env.IMAGE_NAME }}:latest
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: true
          sbom: true

      - name: Create and push tags
        if: steps.check.outputs.lt2_needs_update == 'true' || steps.check.outputs.standard_needs_update == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Create VueTorrent tag if updated
          if [ "${{ steps.check.outputs.vuetorrent_updated }}" = "true" ]; then
            git tag -a "vuetorrent-${{ steps.versions.outputs.latest_vuetorrent }}" -m "VueTorrent version ${{ steps.versions.outputs.latest_vuetorrent }}"
          fi

          # Create lt2 tag if updated
          if [ "${{ steps.check.outputs.lt2_needs_update }}" = "true" ]; then
            git tag -a "qbit-lt2-${{ steps.versions.outputs.latest_qbit_lt2 }}" -m "qBittorrent ${{ steps.versions.outputs.latest_qbit_lt2 }} with VueTorrent ${{ steps.versions.outputs.latest_vuetorrent }} (lt2)"
          fi

          # Create standard tag if updated
          if [ "${{ steps.check.outputs.standard_needs_update }}" = "true" ]; then
            git tag -a "qbit-standard-${{ steps.versions.outputs.latest_qbit_standard }}" -m "qBittorrent ${{ steps.versions.outputs.latest_qbit_standard }} with VueTorrent ${{ steps.versions.outputs.latest_vuetorrent }} (standard)"
          fi

          # Push all tags
          git push origin --tags
